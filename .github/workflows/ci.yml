name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: clean-clone check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm pack --dry-run --ignore-scripts
